name: Update Upstream Scientific Colour Maps
"on":
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-upstream:
    name: Check and prepare upstream update
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Detect latest Zenodo release
        id: detect
        run: python scripts/detect_upstream_update.py

      - name: Stop when no update is needed
        if: steps.detect.outputs.update_needed != 'true'
        run: echo "No new upstream release detected."

      - name: Update tracked metadata and download URL
        if: steps.detect.outputs.update_needed == 'true'
        run: python scripts/apply_upstream_update.py
        env:
          LATEST_VERSION: ${{ steps.detect.outputs.latest_version }}
          LATEST_DOI: ${{ steps.detect.outputs.latest_doi }}
          LATEST_DATE_ISO: ${{ steps.detect.outputs.latest_date_iso }}
          LATEST_DATE_SLASH: ${{ steps.detect.outputs.latest_date_slash }}
          LATEST_ZIP_URL: ${{ steps.detect.outputs.latest_zip_url }}
          LATEST_ZIP_FILENAME: ${{ steps.detect.outputs.latest_zip_filename }}
          LATEST_SOURCE_DIR: ${{ steps.detect.outputs.latest_source_dir }}
          CITATION_YEAR: ${{ steps.detect.outputs.citation_year }}

      - name: Install dependencies for regeneration and checks
        if: steps.detect.outputs.update_needed == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          sudo apt-get update
          sudo apt-get install -y latexmk poppler-utils texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-pictures

      - name: Regenerate assets and run checks
        if: steps.detect.outputs.update_needed == 'true'
        run: |
          make clean download
          make generate
          make test
          make preview-images

      - name: Suggest next tag
        if: steps.detect.outputs.update_needed == 'true'
        id: tag
        run: |
          suggested_tag="scm-v${{ steps.detect.outputs.latest_version }}"
          echo "suggested_tag=$suggested_tag" >> "$GITHUB_OUTPUT"
          echo "Suggested next tag: $suggested_tag"

      - name: Create pull request for upstream update
        if: steps.detect.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/update-scientific-colour-maps-${{ steps.detect.outputs.latest_version }}
          delete-branch: true
          commit-message: "Update Scientific Colour Maps to ${{ steps.detect.outputs.latest_version }}"
          title: "Update Scientific Colour Maps to ${{ steps.detect.outputs.latest_version }}"
          body: |
            Automated upstream update detected.

            - Upstream version: `${{ steps.detect.outputs.latest_version }}`
            - Upstream DOI: `${{ steps.detect.outputs.latest_doi }}`
            - Upstream release date: `${{ steps.detect.outputs.latest_date_iso }}`
            - Parent DOI: `${{ steps.detect.outputs.parent_doi }}`
            - Suggested next repository tag: `${{ steps.tag.outputs.suggested_tag }}`

            This PR updates metadata constants, download URL, generated `.sty` files,
            tests, and preview images.
          labels: |
            automation
            upstream-update
