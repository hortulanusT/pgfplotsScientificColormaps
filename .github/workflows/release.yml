name: Release

"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-release:
    name: Build release bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Download upstream source data
        run: make clean download

      - name: Regenerate style files
        run: make generate

      - name: Run test suite
        run: make test

      - name: Build LaTeX document
        uses: xu-cheng/latex-action@4.1.0
        with:
          root_file: test.tex
          docker_image: texlive/texlive:latest

      - name: Prepare release bundle
        run: |
          rm -rf dist
          mkdir -p dist/ScientificColourMapsTikz
          cp ScientificColourMapsTikz/*.sty dist/ScientificColourMapsTikz/
          cp arealegendstyle.sty README.md LICENSE CHANGELOG.md dist/
          cp test.pdf dist/
          cd dist
          zip -r ../ScientificColourMapsTikz-${GITHUB_REF_NAME}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ScientificColourMapsTikz-${{ github.ref_name }}.zip
            test.pdf
